name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ''
  APPIMAGE_EXTRACT_AND_RUN: '1'
  TAURI_LINUXDEPLOY_ARGS: '--appimage-extract-and-run'

jobs:
  linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libssl-dev pkg-config libfuse2 fuse
          sudo modprobe fuse 2>/dev/null || true
          # Pre-extract linuxdeploy to avoid FUSE issues
          mkdir -p /opt/linuxdeploy
          wget -q -O /tmp/ld.AppImage https://github.com/tauri-apps/binary-releases/releases/download/linuxdeploy/linuxdeploy-x86_64.AppImage
          chmod +x /tmp/ld.AppImage
          /tmp/ld.AppImage --appimage-extract
          mv squashfs-root/* /opt/linuxdeploy/
          wget -q -O /opt/linuxdeploy/usr/bin/linuxdeploy-plugin-gtk https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x /opt/linuxdeploy/usr/bin/linuxdeploy-plugin-gtk
          wget -q -O /opt/linuxdeploy/usr/bin/linuxdeploy-plugin-gstreamer https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gstreamer/master/linuxdeploy-plugin-gstreamer.sh
          chmod +x /opt/linuxdeploy/usr/bin/linuxdeploy-plugin-gstreamer
          echo "/opt/linuxdeploy/usr/bin" >> $GITHUB_PATH
          echo "TAURI_LINUXDEPLOY_PATH=/opt/linuxdeploy/usr/bin/linuxdeploy" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-x86_64-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-x86_64-rust-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: linux-x86_64-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: linux-x86_64-npm-

      - name: Install npm dependencies
        run: npm ci

      - name: Build sidecar binary
        run: cargo build --release -p coderouter-proxy

      - name: Copy sidecar to tauri binaries
        run: |
          TARGET=$(rustc -vV | grep host | cut -d' ' -f2)
          mkdir -p src-tauri/sidecar
          cp target/release/coderouter-proxy src-tauri/sidecar/coderouter-proxy-$TARGET
          chmod +x src-tauri/sidecar/coderouter-proxy-$TARGET

      - name: Build Tauri AppImage
        run: |
          # Build frontend
          npm run build
          # Build Tauri binary (embeds frontend)
          cargo build --release -p coderouter
          # Manually create AppImage using pre-extracted linuxdeploy
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/applications" "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          cp target/release/coderouter "$APPDIR/usr/bin/"
          cat > "$APPDIR/usr/share/applications/coderouter.desktop" <<EOF
          [Desktop Entry]
          Name=CodeRouter
          Exec=coderouter
          Icon=coderouter
          Type=Application
          Categories=Utility;
          EOF
          cp src-tauri/icons/256x256.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/coderouter.png"
          /opt/linuxdeploy/usr/bin/linuxdeploy --appdir "$APPDIR" --desktop-file "$APPDIR/usr/share/applications/coderouter.desktop" --output appimage
          mkdir -p target/release/bundle/appimage
          mv CodeRouter*.AppImage "target/release/bundle/appimage/CodeRouter_${VERSION}_amd64.AppImage"

      - name: Sign AppImage
        run: |
          APPIMAGE=$(find target/release/bundle/appimage/ -name "*.AppImage" 2>/dev/null | head -1)
          if [ -n "$APPIMAGE" ] && [ -f src-tauri/update.key ]; then
            cargo tauri signer sign -f src-tauri/update.key -p "" "$APPIMAGE"
          fi

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-appimage
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.AppImage.sig

      - name: Upload TUI tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-tui
          path: dist/coderouter-tui-*-linux-x86_64.tar.gz

  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-aarch64-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-aarch64-rust-

      - name: Build TUI + proxy (aarch64)
        run: cargo build --release -p coderouter-tui -p coderouter-proxy

      - name: Package TUI tarball
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
          STAGE=dist/.stage-arm
          STAGEDIR=$STAGE/coderouter-tui-$VERSION-linux-aarch64
          mkdir -p "$STAGEDIR"
          cp target/release/coderouter-tui "$STAGEDIR/"
          cp target/release/coderouter-proxy "$STAGEDIR/"
          chmod +x "$STAGEDIR/coderouter-tui" "$STAGEDIR/coderouter-proxy"
          (cd "$STAGE" && tar czf "$GITHUB_WORKSPACE/dist/coderouter-tui-$VERSION-linux-aarch64.tar.gz" "coderouter-tui-$VERSION-linux-aarch64")

      - name: Upload TUI tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64-tui
          path: dist/coderouter-tui-*-linux-aarch64.tar.gz

  macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-x86_64-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-x86_64-rust-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: macos-x86_64-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: macos-x86_64-npm-

      - name: Install npm dependencies
        run: npm ci

      - name: Build sidecar + TUI binaries
        run: cargo build --release -p coderouter-proxy -p coderouter-tui

      - name: Copy sidecar to tauri binaries
        run: |
          TARGET=$(rustc -vV | grep host | cut -d' ' -f2)
          mkdir -p src-tauri/sidecar
          cp target/release/coderouter-proxy src-tauri/sidecar/coderouter-proxy-$TARGET
          chmod +x src-tauri/sidecar/coderouter-proxy-$TARGET

      - name: Build Tauri DMG
        run: npm run tauri build

      - name: Build TUI + proxy tarball
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
          STAGE=dist/.stage-macos-x86
          STAGEDIR=$STAGE/coderouter-tui-$VERSION-macos-x86_64
          mkdir -p "$STAGEDIR"
          cp target/release/coderouter-tui "$STAGEDIR/"
          cp target/release/coderouter-proxy "$STAGEDIR/"
          chmod +x "$STAGEDIR/coderouter-tui" "$STAGEDIR/coderouter-proxy"
          (cd "$STAGE" && tar czf "$GITHUB_WORKSPACE/dist/coderouter-tui-$VERSION-macos-x86_64.tar.gz" "coderouter-tui-$VERSION-macos-x86_64")

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-dmg
          path: target/release/bundle/dmg/*.dmg

      - name: Upload TUI tarball
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-tui
          path: dist/coderouter-tui-*-macos-x86_64.tar.gz

  macos-aarch64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-aarch64-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-aarch64-rust-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: macos-aarch64-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: macos-aarch64-npm-

      - name: Install npm dependencies
        run: npm ci

      - name: Build sidecar + TUI binaries
        run: cargo build --release -p coderouter-proxy -p coderouter-tui

      - name: Copy sidecar to tauri binaries (aarch64)
        run: |
          TARGET=$(rustc -vV | grep host | cut -d' ' -f2)
          mkdir -p src-tauri/sidecar
          cp target/release/coderouter-proxy src-tauri/sidecar/coderouter-proxy-$TARGET
          chmod +x src-tauri/sidecar/coderouter-proxy-$TARGET

      - name: Build Tauri DMG
        run: npm run tauri build

      - name: Build TUI + proxy tarball
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
          STAGE=dist/.stage-macos-arm
          STAGEDIR=$STAGE/coderouter-tui-$VERSION-macos-aarch64
          mkdir -p "$STAGEDIR"
          cp target/release/coderouter-tui "$STAGEDIR/"
          cp target/release/coderouter-proxy "$STAGEDIR/"
          chmod +x "$STAGEDIR/coderouter-tui" "$STAGEDIR/coderouter-proxy"
          (cd "$STAGE" && tar czf "$GITHUB_WORKSPACE/dist/coderouter-tui-$VERSION-macos-aarch64.tar.gz" "coderouter-tui-$VERSION-macos-aarch64")

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64-dmg
          path: target/release/bundle/dmg/*.dmg

      - name: Upload TUI tarball
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64-tui
          path: dist/coderouter-tui-*-macos-aarch64.tar.gz

  windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x86_64-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-x86_64-rust-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: windows-x86_64-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: windows-x86_64-npm-

      - name: Install npm dependencies
        run: npm ci

      - name: Build sidecar + TUI binaries
        run: cargo build --release -p coderouter-proxy -p coderouter-tui

      - name: Copy sidecar to tauri binaries
        shell: pwsh
        run: |
          $target = (rustc -vV | Select-String "host:" | ForEach-Object { $_ -replace 'host: ', '' }).Trim()
          New-Item -ItemType Directory -Force -Path src-tauri\sidecar
          Copy-Item "target/release/coderouter-proxy.exe" "src-tauri\sidecar\coderouter-proxy-$target.exe"

      - name: Build Tauri installer
        run: npm run tauri build

      - name: Build TUI + proxy zip
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $stageDir = "dist/coderouter-tui-$version-windows-x86_64"
          New-Item -ItemType Directory -Force -Path $stageDir
          Copy-Item "target/release/coderouter-tui.exe" "$stageDir/"
          Copy-Item "target/release/coderouter-proxy.exe" "$stageDir/"
          Compress-Archive -Path $stageDir -DestinationPath "dist/coderouter-tui-$version-windows-x86_64.zip"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-installer
          path: target/release/bundle/nsis/*.exe

      - name: Upload TUI zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-tui
          path: dist/coderouter-tui-*-windows-x86_64.zip

  create-release:
    runs-on: ubuntu-latest
    needs:
      - linux-x86_64
      - linux-aarch64
      - macos-x86_64
      - macos-aarch64
      - windows-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect artifacts into release directory
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.AppImage' -o -name '*.sig' -o -name '*.dmg' -o -name '*.exe' -o -name '*.tar.gz' -o -name '*.zip' -o -name '*.msi' \) -exec cp {} release/ \;

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --oneline "${PREV_TAG}..HEAD" | sed 's/^/- /')
          else
            NOTES="Initial release"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
          TAG="v${VERSION}"
          REPO="CWinthorpe/codeRouter"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          LINUX_X86_SIG=""
          if [ -f "release/CodeRouter_${VERSION}_amd64.AppImage.sig" ]; then
            LINUX_X86_SIG=$(tr -d '\n' < "release/CodeRouter_${VERSION}_amd64.AppImage.sig")
          fi

          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq -n \
            --arg ver "$VERSION" \
            --arg notes "See https://github.com/${REPO}/releases/tag/${TAG} for details" \
            --arg pub_date "$PUB_DATE" \
            --arg linux_x86_sig "$LINUX_X86_SIG" \
            --arg linux_x86_url "${BASE_URL}/CodeRouter_${VERSION}_amd64.AppImage" \
            --arg linux_arm_url "${BASE_URL}/coderouter-tui-${VERSION}-linux-aarch64.tar.gz" \
            --arg macos_x86_url "${BASE_URL}/CodeRouter_${VERSION}_x64.dmg" \
            --arg macos_arm_url "${BASE_URL}/CodeRouter_${VERSION}_aarch64.dmg" \
            --arg windows_url "${BASE_URL}/CodeRouter_${VERSION}_x64-setup.exe" \
            '{
              version: $ver,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "linux-x86_64": { signature: $linux_x86_sig, url: $linux_x86_url },
                "linux-aarch64": { signature: "", url: $linux_arm_url },
                "macos-x86_64": { signature: "", url: $macos_x86_url },
                "macos-aarch64": { signature: "", url: $macos_arm_url },
                "windows-x86_64": { signature: "", url: $windows_url }
              }
            }' > release/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: release/*
          fail_on_unmatched_files: false
